# Fly.io app configuration
# https://fly.io/docs/reference/configuration/
# Deploy with: fly launch --no-deploy → fly secrets set KEY=val → fly deploy

app = "litellm-gateway"          # Change to your desired app name
primary_region = "ord"            # Chicago — or lhr (London), sin (Singapore), etc.

[build]
  # Fly.io uses the Dockerfile automatically

[http_service]
  internal_port = 8000            # Must match $PORT in Dockerfile/main.py
  force_https = true
  auto_stop_machines = false      # Set true for dev/low-traffic to save cost
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"          # 256MB RAM — upgrade to shared-cpu-2x for DeBERTa

[env]
  PORT = "8000"
  HOST = "0.0.0.0"
  STREAMLIT_PORT = "8501"

# Health check
[[http_service.checks]]
  grace_period = "60s"            # Give DeBERTa model time to load
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "10s"
