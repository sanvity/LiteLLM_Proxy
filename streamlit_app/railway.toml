# Railway configuration for the Streamlit Dashboard service
# Deploy this as a SEPARATE Railway service pointing to the streamlit_app/ directory.
# Set FASTAPI_URL env var to your FastAPI service's Railway public URL.

[build]
# No Dockerfile needed — Railway detects Python + Procfile automatically
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
