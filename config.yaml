# LiteLLM Routing and Load-Balancing Configuration - PII Shield Edition

model_list:
  # --- primary-cluster: Served by Groq and Cerebras ---
  # 1. Groq Llama 3.1 8B (Primary load-balanced node, 128k context)
  - model_name: primary-cluster
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY
      rpm: 30
      tpm: 100000
      tpr: 131072
      cost_per_million: 0.05
      complexity_tier: medium
  
  # 2. Cerebras Llama 3.1 8B (Secondary load-balanced node, ultra-low latency, 8k context)
  - model_name: primary-cluster
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      rpm: 30
      tpm: 200000
      tpr: 8192
      cost_per_million: 0.01
      complexity_tier: low

  # 3. Groq Llama 3.3 70B (Primary High Complexity node, 128k context)
  - model_name: primary-cluster
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      rpm: 30
      tpm: 100000
      tpr: 131072
      cost_per_million: 0.70
      complexity_tier: high

  # --- backup-cluster: Served by Together AI and Local Ollama ---
  # 1. Together AI Llama 3.1 8B (Backup cluster, 128k context)
  - model_name: backup-cluster
    litellm_params:
      model: together_ai/meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
      api_key: os.environ/TOGETHERAI_API_KEY
      rpm: 50
      tpm: 150000
      tpr: 131072
      cost_per_million: 0.20
      complexity_tier: medium

  # 2. Together AI Llama 3.3 70B (Backup High Complexity node, 128k context)
  - model_name: backup-cluster
    litellm_params:
      model: together_ai/meta-llama/Llama-3.3-70B-Instruct-Turbo
      api_key: os.environ/TOGETHERAI_API_KEY
      rpm: 50
      tpm: 150000
      tpr: 131072
      cost_per_million: 0.90
      complexity_tier: high

  # 3. Local Ollama Llama 3.1 (Local backup failover - zero cost)
  - model_name: backup-cluster
    litellm_params:
      model: ollama/llama3.1
      api_base: os.environ/OLLAMA_API_BASE
      rpm: 10000
      tpm: 1000000
      tpr: 131072
      cost_per_million: 0.00
      complexity_tier: low

# General Router Settings
router_settings:
  routing_strategy: usage-based-routing # Balanced dynamically based on current TPM/RPM usage
  allowed_fails: 1
  cooldown_time: 60
  num_retries: 3
  timeout: 10

# Dynamic Fallback chains
# If primary-cluster fails, route to backup-cluster
general_fallbacks:
  - primary-cluster: ["backup-cluster"]

# If the request exceeds Cerebras Llama 3.1 8B context window (TPR 8192), 
# LiteLLM automatically uses the larger context models in the primary-cluster (Groq) or premium backups!
context_window_fallbacks:
  - primary-cluster: ["backup-cluster"]
# Local PII shielding and dynamic Aporia control plane configurations
pii_shield_settings:
  enabled: true
  entities:
    - PERSON
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - US_SSN
    - CREDIT_CARD
    - IDENTIFIER
  sensitivity:
    prompt_injection: 0.5
    pii_leakage: 0.3
    hallucinations: 0.7
    jailbreak: 0.5
    toxicity: 0.6
  evaluators:
    prompt_injection: true
    pii_leakage: true
    hallucinations: true
    jailbreak: true
    toxicity: true
  remediation_actions:
    prompt_injection: BLOCK
    pii_leakage: MASK
    hallucinations: REWRITE
    jailbreak: BLOCK
    toxicity: BLOCK
  custom_regex_rules: []

guardrails:
  - guardrail_name: "aporia-pre-guard"
    litellm_params:
      guardrail: aporia
      mode: "during_call"
      api_key: os.environ/APORIA_API_KEY_1
      api_base: os.environ/APORIA_API_BASE_1
  
  - guardrail_name: "aporia-post-guard"
    litellm_params:
      guardrail: aporia
      mode: "post_call"
      api_key: os.environ/APORIA_API_KEY_2
      api_base: os.environ/APORIA_API_BASE_2
    guardrail_info:
      params:
        - name: "toxicity_score"
          type: "float"
          description: "Score between 0-1 indicating content toxicity level"
        - name: "pii_detection"
          type: "boolean"

  # Example LiteLLM Content Filter (Built-in Guardrails)
  - guardrail_name: "harmful-content-filter"
    litellm_params:
      guardrail: litellm_content_filter
      mode: "pre_call"
      blocked_words:
        - keyword: "toxic phrase"
          action: "BLOCK"
          description: "Malicious input attempt"
        - keyword: "sensitive data"
          action: "MASK"
          description: "Sensitive company data masking"
